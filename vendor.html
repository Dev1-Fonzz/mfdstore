<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MFD ENTERPRISE PANEL</title>
<script src="https://cdn.tailwindcss.com"></script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, collection, addDoc, query, where, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=null;
let profile=null;

/* AUTH SYSTEM */

async function register(email,password){
const cred = await createUserWithEmailAndPassword(auth,email,password);
const UAC="VENFD-"+Math.random().toString(36).substring(2,8).toUpperCase();
await setDoc(doc(db,"vendors",cred.user.uid),{
UAC,
role:"vendor",
commissionRate:1,
totalSales:0,
totalCommission:0,
totalOrdersToday:0,
status:"ACTIVE",
createdAt:Date.now()
});
}

async function login(email,password){
await signInWithEmailAndPassword(auth,email,password);
}

async function googleLogin(){
await signInWithPopup(auth,new GoogleAuthProvider());
}

function logout(){ signOut(auth); }

onAuthStateChanged(auth,async(user)=>{
if(user){
currentUser=user;
const snap=await getDoc(doc(db,"vendors",user.uid));
if(snap.exists()){
profile=snap.data();
profile.role==="admin"?loadAdmin():loadVendor();
}else alert("Profile missing");
}else loadAuth();
});

/* AUTH UI */

function loadAuth(){
document.body.innerHTML=`
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-400 via-purple-400 to-pink-400">
<div class="bg-white p-6 rounded-xl shadow-xl w-80">
<h2 class="text-xl font-bold mb-4">MFD Enterprise Login</h2>
<input id="e" class="border p-2 w-full mb-2" placeholder="Email">
<input id="p" type="password" class="border p-2 w-full mb-2" placeholder="Password">
<button onclick="login(e.value,p.value)" class="bg-purple-600 text-white w-full p-2 mb-2 rounded">Login</button>
<button onclick="register(e.value,p.value)" class="bg-green-500 text-white w-full p-2 mb-2 rounded">Register</button>
<button onclick="googleLogin()" class="bg-red-500 text-white w-full p-2 rounded">Google</button>
</div></div>`;
}

/* VENDOR DASHBOARD */

function loadVendor(){
document.body.innerHTML=`
<div class="p-6 bg-gradient-to-br from-blue-200 via-purple-200 to-pink-200 min-h-screen">
<h1 class="text-2xl font-bold">Vendor Panel (${profile.UAC})</h1>
<button onclick="logout()" class="bg-red-500 text-white px-3 py-1 rounded">Logout</button>

<div class="grid grid-cols-3 gap-4 mt-6">
<div class="bg-white p-4 rounded shadow">Sales RM ${profile.totalSales}</div>
<div class="bg-white p-4 rounded shadow">Commission RM ${profile.totalCommission}</div>
<div class="bg-white p-4 rounded shadow">Orders Today ${profile.totalOrdersToday}</div>
</div>

<h2 class="mt-6 font-bold">Add Product</h2>
<input id="pn" class="border p-2 w-full mb-2" placeholder="Item Name">
<input id="pp" class="border p-2 w-full mb-2" placeholder="Sale Price">
<button onclick="addProduct()" class="bg-blue-600 text-white p-2 rounded">Add</button>

<h2 class="mt-6 font-bold">Product List</h2>
<div id="plist"></div>

<h2 class="mt-6 font-bold">Orders</h2>
<div id="olist"></div>
</div>`;

listenProducts();
listenOrders();
}

/* ADMIN DASHBOARD */

function loadAdmin(){
document.body.innerHTML=`
<div class="p-6 bg-gradient-to-br from-black via-purple-700 to-pink-700 text-white min-h-screen">
<h1 class="text-2xl font-bold">ADMIN ENTERPRISE CONTROL</h1>
<button onclick="logout()" class="bg-red-500 px-3 py-1 rounded mt-2">Logout</button>

<h2 class="mt-6 font-bold">All Vendors</h2>
<div id="vendors"></div>

<h2 class="mt-6 font-bold">All Orders</h2>
<div id="orders"></div>
</div>`;

listenAllVendors();
listenAllOrders();
}

/* PRODUCT SYSTEM */

async function addProduct(){
await addDoc(collection(db,"products"),{
vendorId:currentUser.uid,
itemName:pn.value,
salePrice:Number(pp.value),
status:"Public",
totalSold:0,
totalIncome:0,
uniqueCode:"ITEM-"+Date.now(),
createdAt:Date.now()
});
}

function listenProducts(){
const q=query(collection(db,"products"),where("vendorId","==",currentUser.uid));
onSnapshot(q,(snap)=>{
let h="";
snap.forEach(d=>{
const x=d.data();
h+=`<div class="bg-white p-2 mb-2 rounded">
${x.itemName} RM${x.salePrice}
<button onclick="delProduct('${d.id}')" class="bg-red-500 text-white px-2 ml-2">X</button>
</div>`;
});
plist.innerHTML=h;
});
}

async function delProduct(id){ await deleteDoc(doc(db,"products",id)); }

/* ORDER SYSTEM + COMMISSION ENGINE */

function listenOrders(){
const q=query(collection(db,"orders"),where("vendorId","==",currentUser.uid));
onSnapshot(q,(snap)=>{
let h="";
snap.forEach(d=>{
const o=d.data();
h+=`<div class="bg-white p-2 mb-2 rounded">
${o.itemName} | ${o.orderCategory} | RM${o.totalPrice}
</div>`;
});
olist.innerHTML=h;
});
}

/* AUTO COMMISSION CALCULATOR */

async function createOrder(productId,qty){
const productSnap=await getDoc(doc(db,"products",productId));
const product=productSnap.data();

const total=product.salePrice*qty;
const commission=profile.commissionRate;
const charged=commission;

await addDoc(collection(db,"orders"),{
vendorId:currentUser.uid,
productId,
itemName:product.itemName,
quantity:qty,
totalPrice:total,
commissionCharged:charged,
orderCategory:"To Pay",
paymentStatus:"Not Verified",
createdAt:Date.now()
});

/* AUTO UPDATE SALES */
await updateDoc(doc(db,"vendors",currentUser.uid),{
totalSales:increment(total),
totalCommission:increment(charged),
totalOrdersToday:increment(1)
});

await updateDoc(doc(db,"products",productId),{
totalSold:increment(qty),
totalIncome:increment(total)
});
}

/* ADMIN LISTENERS */

function listenAllVendors(){
onSnapshot(collection(db,"vendors"),(snap)=>{
let h="";
snap.forEach(d=>{
const v=d.data();
h+=`<div class="bg-gray-900 p-2 mb-2 rounded">
${v.UAC} | Sales RM${v.totalSales} | Commission RM${v.totalCommission}
</div>`;
});
vendors.innerHTML=h;
});
}

function listenAllOrders(){
onSnapshot(collection(db,"orders"),(snap)=>{
let h="";
snap.forEach(d=>{
const o=d.data();
h+=`<div class="bg-gray-800 p-2 mb-2 rounded">
${o.itemName} | RM${o.totalPrice} | Commission RM${o.commissionCharged}
</div>`;
});
orders.innerHTML=h;
});
}

/* EXPORT */
window.login=login;
window.register=register;
window.googleLogin=googleLogin;
window.logout=logout;
window.addProduct=addProduct;
window.delProduct=delProduct;

</script>
</head>
<body></body>
</html>
