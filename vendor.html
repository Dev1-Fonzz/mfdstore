<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏪 Vendor Manager - MFD Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #FFD700; --primary-dark: #FFA500; --secondary: #00CED1; --glass-bg: rgba(255, 255, 255, 0.92); --glass-border: rgba(255, 215, 0, 0.4); --dark: #1a1a2e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #FFF9E6 0%, #E0FFFF 35%, #FFECB3 100%); background-size: 400% 400%; animation: gradientBG 20s ease infinite; color: var(--dark); min-height: 100vh; }
        @keyframes gradientBG { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
        .glitter-text { background: linear-gradient(90deg, #FFD700, #00CED1, #FF6B6B, #FFD700); -webkit-background-clip: text; background-clip: text; color: transparent; background-size: 400% auto; animation: shine 5s linear infinite; font-weight: 700; }
        @keyframes shine { 0%{background-position:0%} 100%{background-position:400%} }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: 0 8px 32px rgba(255,215,0,0.2); }
        .btn-glitter { background: linear-gradient(45deg, #FFD700, #FF8C00, #00CED1); background-size: 300% 300%; animation: gradientMove 4s ease infinite; color: var(--dark); font-weight: 600; }
        @keyframes gradientMove { 0%,100%{background-position:0%} 50%{background-position:100%} }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
        .badge-success { background: #dcfce7; color: #166534; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .input-glass { background: rgba(255,255,255,0.8); border: 1px solid var(--glass-border); border-radius: 10px; padding: 10px 14px; width: 100%; }
        .input-glass:focus { outline: none; border-color: var(--secondary); }
        .product-card { background: white; border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,215,0,0.2); }
        .product-img { height: 140px; background: #fff9e6; display: flex; align-items: center; justify-content: center; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .chat-container { display: grid; grid-template-columns: 260px 1fr; gap: 1rem; height: 65vh; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .msg-bubble { max-width: 80%; padding: 10px 14px; border-radius: 16px; }
        .msg-me { align-self: flex-end; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: var(--dark); }
        .msg-other { align-self: flex-start; background: white; border-left: 3px solid var(--secondary); }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 12px; color: white; font-weight: 500; z-index: 9999; animation: slideIn 0.3s, fadeOut 0.3s 2.7s forwards; }
        .toast.success { background: #22c55e; } .toast.error { background: #ef4444; }
        @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
        @keyframes fadeOut { to{opacity:0} }
        .loader { border: 3px solid rgba(0,0,0,0.1); border-left-color: var(--primary); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 100%{transform:rotate(360deg)} }
        @media(max-width:768px) { .chat-container { grid-template-columns: 1fr; } .contacts-panel { position: fixed; inset: 0; z-index: 10; background: white; margin: 10px; border-radius: 20px; } .contacts-panel.hidden { display: none; } }
    </style>
</head>
<body class="p-2 md:p-4">

    <audio id="snd-click" src="https://assets.mixkit.co/sfx/preview/mixkit-modern-technology-select-3124.mp3" preload="auto"></audio>
    <audio id="snd-success" src="https://assets.mixkit.co/sfx/preview/mixkit-positive-notification-951.mp3" preload="auto"></audio>    <audio id="snd-error" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3" preload="auto"></audio>

    <div id="toast" class="toast hidden"></div>

    <!-- Navbar -->
    <nav class="glass-panel sticky top-2 md:top-4 z-40 p-3 flex justify-between items-center gap-2">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-yellow-400 to-cyan-400 flex items-center justify-center text-white">
                <i class="fas fa-store"></i>
            </div>
            <span class="font-bold glitter-text">Vendors Manager</span>
        </div>
        <div class="flex items-center gap-2">
            <div id="auth-nav" class="flex gap-2">
                <button onclick="showSection('login')" class="px-3 py-1.5 rounded-lg bg-white/80 text-sm font-medium">Login</button>
                <button onclick="showSection('register')" class="px-3 py-1.5 rounded-lg btn-glitter text-sm">Register</button>
            </div>
            <div id="user-nav" class="hidden flex items-center gap-2">
                <span id="nav-uac" class="text-xs font-mono bg-cyan-100 px-2 py-0.5 rounded hidden md:inline"></span>
                <button onclick="showSection('dashboard')" class="w-8 h-8 rounded-lg bg-yellow-400 text-white"><i class="fas fa-user"></i></button>
                <button onclick="doLogout()" class="w-8 h-8 rounded-lg bg-red-400 text-white"><i class="fas fa-sign-out"></i></button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto pb-20 fade-in">
        
        <!-- Login Section - DEFAULT VISIBLE -->
        <section id="view-login" class="max-w-sm mx-auto mt-12">
            <div class="glass-panel p-6">
                <h2 class="text-2xl font-bold glitter-text text-center mb-4">Vendor Login</h2>
                <form onsubmit="doLogin(event)" class="space-y-3">
                    <input type="email" id="login-email" required placeholder="Email" class="input-glass">
                    <input type="password" id="login-pass" required placeholder="Password" class="input-glass">
                    <button type="submit" class="btn-glitter w-full py-2.5 rounded-lg font-medium">Login</button>
                </form>
                <div class="my-4 text-center text-sm text-gray-500">ATAU</div>
                <div class="space-y-2">
                    <button onclick="doGoogleSignIn()" class="w-full py-2 rounded-lg border flex items-center justify-center gap-2 text-sm">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4"> Google
                    </button>
                    <button onclick="doGithubSignIn()" class="w-full py-2 rounded-lg bg-gray-900 text-white flex items-center justify-center gap-2 text-sm">
                        <i class="fab fa-github"></i> GitHub
                    </button>
                </div>
                <p class="text-center mt-4 text-sm">Belum ada akaun? <span class="text-yellow-600 font-medium cursor-pointer" onclick="showSection('register')">Daftar</span></p>
            </div>
        </section>

        <!-- Register Section -->        <section id="view-register" class="max-w-sm mx-auto mt-12 hidden">
            <div class="glass-panel p-6">
                <h2 class="text-2xl font-bold glitter-text text-center mb-4">Register Vendor</h2>
                <form onsubmit="doRegister(event)" class="space-y-3">
                    <input type="text" id="reg-business" required placeholder="Business Name *" class="input-glass">
                    <input type="tel" id="reg-phone" required placeholder="Phone *" class="input-glass">
                    <input type="email" id="reg-email" required placeholder="Email *" class="input-glass">
                    <input type="password" id="reg-pass" required minlength="6" placeholder="Password (min 6) *" class="input-glass">
                    <button type="submit" class="btn-glitter w-full py-2.5 rounded-lg font-medium">Register</button>
                </form>
                <p class="text-center mt-4 text-sm">Sudah ada akaun? <span class="text-cyan-600 font-medium cursor-pointer" onclick="showSection('login')">Login</span></p>
            </div>
        </section>

        <!-- Dashboard Section -->
        <section id="view-dashboard" class="hidden">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                <div class="glass-panel p-3 text-center">
                    <div class="text-xl font-bold text-yellow-600" id="stat-sales">RM 0</div>
                    <div class="text-xs text-gray-500">Total Sales</div>
                </div>
                <div class="glass-panel p-3 text-center">
                    <div class="text-xl font-bold text-green-600" id="stat-orders">0</div>
                    <div class="text-xs text-gray-500">Active Orders</div>
                </div>
                <div class="glass-panel p-3 text-center">
                    <div class="text-xl font-bold text-purple-600" id="stat-products">0</div>
                    <div class="text-xs text-gray-500">Products</div>
                </div>
                <div class="glass-panel p-3 text-center">
                    <div class="text-xl font-bold text-red-600" id="stat-commission">RM 0</div>
                    <div class="text-xs text-gray-500">Commission</div>
                </div>
            </div>

            <div class="flex gap-2 mb-4 overflow-x-auto pb-1">
                <button onclick="switchTab('products')" class="px-4 py-1.5 rounded-lg bg-white/80 text-sm font-medium whitespace-nowrap">Produk</button>
                <button onclick="switchTab('orders')" class="px-4 py-1.5 rounded-lg bg-white/80 text-sm font-medium whitespace-nowrap">Pesanan</button>
                <button onclick="switchTab('profile')" class="px-4 py-1.5 rounded-lg bg-white/80 text-sm font-medium whitespace-nowrap">Profil</button>
                <button onclick="switchTab('chat')" class="px-4 py-1.5 rounded-lg bg-white/80 text-sm font-medium whitespace-nowrap">💬 Chat</button>
            </div>

            <div id="content-products" class="glass-panel p-4 mb-4">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-semibold">📦 Katalog Produk</h3>
                    <button onclick="openProductModal()" class="btn-glitter px-3 py-1.5 rounded-lg text-sm">+ Tambah</button>
                </div>
                <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    <div class="col-span-full text-center py-6 text-gray-500">
                        <div class="loader mx-auto mb-2"></div>                        Memuatkan...
                    </div>
                </div>
            </div>

            <div id="content-orders" class="glass-panel p-4 mb-4 hidden">
                <h3 class="font-semibold mb-3">📋 Pesanan</h3>
                <div id="order-list" class="text-center py-4 text-gray-500">Tiada pesanan</div>
            </div>

            <div id="content-profile" class="glass-panel p-4 mb-4 hidden">
                <h3 class="font-semibold mb-4">⚙️ Profil</h3>
                <div class="space-y-3">
                    <input type="text" id="prof-seller" placeholder="Seller Name" class="input-glass">
                    <input type="text" id="prof-business" placeholder="Business Name" class="input-glass">
                    <input type="tel" id="prof-phone" placeholder="Phone" class="input-glass">
                    <input type="email" id="prof-email" placeholder="Email" class="input-glass" disabled>
                    <textarea id="prof-address" placeholder="Address" class="input-glass" rows="2"></textarea>
                    <textarea id="prof-payment" placeholder="Payment Info" class="input-glass" rows="2"></textarea>
                </div>
                <div class="mt-4 flex gap-2">
                    <button onclick="saveProfile()" class="btn-glitter px-4 py-2 rounded-lg text-sm">💾 Simpan</button>
                    <button onclick="doLogout()" class="px-4 py-2 rounded-lg bg-red-100 text-red-600 text-sm">Logout</button>
                </div>
            </div>

            <div id="content-chat" class="glass-panel p-0 mb-4 hidden">
                <div class="chat-container">
                    <div class="contacts-panel glass-panel p-2 overflow-y-auto" id="chat-contacts">
                        <div class="text-center py-6 text-gray-500 text-sm">Tiada perbualan</div>
                    </div>
                    <div class="flex flex-col">
                        <div class="p-3 border-b bg-yellow-50">
                            <span id="chat-name" class="font-medium">Pilih Pelanggan</span>
                        </div>
                        <div id="chat-msgs" class="chat-messages bg-white/40 flex-1"></div>
                        <div class="p-2 border-t flex gap-2">
                            <textarea id="chat-input" rows="1" placeholder="Taip..." class="flex-1 input-glass resize-none" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
                            <button onclick="sendMessage()" class="p-2 bg-yellow-400 text-white rounded"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDMrexlgTwauuqmZ2kZECwqqEYmwtj7Zrs",
            authDomain: "mfd-store.firebaseapp.com",
            projectId: "mfd-store",
            storageBucket: "mfd-store.firebasestorage.app",
            messagingSenderId: "1039564529069",
            appId: "1:1039564529069:web:bc7c752f3618e6cb879524"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // State
        let currentUser = null;
        let userProfile = null;

        // Utils
        function playSound(type) {
            const sounds = { click: document.getElementById('snd-click'), success: document.getElementById('snd-success'), error: document.getElementById('snd-error') };
            if(sounds[type]) { sounds[type].currentTime = 0; sounds[type].play().catch(()=>{}); }
        }

        function showToast(msg, type='info') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = `toast ${type}`;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
            playSound(type === 'error' ? 'error' : 'success');
        }

        // Navigation - CRITICAL FIX: Make sections visible
        function showSection(sectionName) {
            playSound('click');
            // Hide all sections
            document.querySelectorAll('section[id^="view-"]').forEach(el => el.classList.add('hidden'));
            // Show target section
            const target = document.getElementById(`view-${sectionName}`);
            if (target) {
                target.classList.remove('hidden');
                target.classList.add('fade-in');
            }
            // Update nav
            if (currentUser) {                document.getElementById('auth-nav').classList.add('hidden');
                document.getElementById('user-nav').classList.remove('hidden');
            } else {
                document.getElementById('auth-nav').classList.remove('hidden');
                document.getElementById('user-nav').classList.add('hidden');
            }
        }

        function switchTab(tab) {
            playSound('click');
            document.querySelectorAll('[id^="content-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            if (tab === 'chat') loadChats();
        }

        // Auth Functions
        function doRegister(e) {
            e.preventDefault();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value;
            const business = document.getElementById('reg-business').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();

            if (!email || !pass || !business || !phone) return showToast('Isi semua medan *', 'error');
            
            auth.createUserWithEmailAndPassword(email, pass)
                .then(cred => {
                    const uac = "VEN-" + Math.random().toString(36).slice(2,8).toUpperCase();
                    return db.collection('vendors').doc(cred.user.uid).set({
                        uid: cred.user.uid, email, phone, businessName: business, sellerName: business,
                        uac, status: 'ACTIVE', role: 'vendor', commissionRate: 1,
                        paymentInfo: '', address: '', agentStatus: 'Online',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                })
                .then(() => { showToast('✅ Daftar berjaya!', 'success'); showSection('login'); })
                .catch(err => showToast('❌ ' + err.message, 'error'));
        }

        function doLogin(e) {
            e.preventDefault();
            auth.signInWithEmailAndPassword(
                document.getElementById('login-email').value.trim(),
                document.getElementById('login-pass').value
            ).catch(err => showToast('❌ ' + err.message, 'error'));
        }

        function doGoogleSignIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => showToast('❌ ' + err.message, 'error'));        }

        function doGithubSignIn() {
            const provider = new firebase.auth.GithubAuthProvider();
            auth.signInWithPopup(provider).catch(err => showToast('❌ ' + err.message, 'error'));
        }

        function doLogout() {
            auth.signOut().then(() => { showToast('✅ Logout', 'success'); showSection('login'); });
        }

        // Auth State Listener
        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            if (user) {
                try {
                    const doc = await db.collection('vendors').doc(user.uid).get();
                    if (doc.exists) {
                        userProfile = doc.data();
                        document.getElementById('nav-uac').textContent = userProfile.uac || '';
                        document.getElementById('prof-seller').value = userProfile.sellerName || '';
                        document.getElementById('prof-business').value = userProfile.businessName || '';
                        document.getElementById('prof-phone').value = userProfile.phone || '';
                        document.getElementById('prof-email').value = userProfile.email || '';
                        document.getElementById('prof-address').value = userProfile.address || '';
                        document.getElementById('prof-payment').value = userProfile.paymentInfo || '';
                    }
                    showSection('dashboard');
                    loadProducts();
                } catch (err) {
                    console.error(err);
                    showToast('Gagal load profil', 'error');
                }
            } else {
                userProfile = null;
                showSection('login');
            }
        });

        // Load Products
        function loadProducts() {
            if (!currentUser) return;
            db.collection('products').where('vendorId', '==', currentUser.uid)
                .onSnapshot(snap => {
                    const grid = document.getElementById('product-grid');
                    if (snap.empty) {
                        grid.innerHTML = '<div class="col-span-full text-center py-6 text-gray-500">Tiada produk</div>';
                        document.getElementById('stat-products').textContent = '0';
                        return;
                    }                    let html = '';
                    let total = 0;
                    snap.forEach(d => {
                        const p = d.data();
                        const sold = p.totalSold || 0;
                        total += (p.salePrice || 0) * sold;
                        html += `<div class="product-card">
                            <div class="product-img">${p.imageUrl ? `<img src="${p.imageUrl}">` : '<i class="fas fa-image text-2xl"></i>'}</div>
                            <div class="p-3">
                                <div class="font-medium text-sm truncate">${p.name}</div>
                                <div class="font-bold text-yellow-600">RM${p.salePrice}</div>
                                <div class="text-xs text-gray-500">📦 ${sold}</div>
                            </div>
                        </div>`;
                    });
                    grid.innerHTML = html;
                    document.getElementById('stat-products').textContent = snap.size;
                    document.getElementById('stat-sales').textContent = 'RM ' + total.toFixed(2);
                });
        }

        // Chat
        function loadChats() {
            if (!currentUser) return;
            document.getElementById('chat-contacts').innerHTML = '<div class="text-center py-6 text-gray-500 text-sm">Tiada perbualan</div>';
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const txt = input.value.trim();
            if (!txt) return;
            showToast('Mesej dihantar', 'success');
            input.value = '';
        }

        // Profile
        function saveProfile() {
            if (!currentUser) return;
            db.collection('vendors').doc(currentUser.uid).update({
                sellerName: document.getElementById('prof-seller').value,
                businessName: document.getElementById('prof-business').value,
                phone: document.getElementById('prof-phone').value,
                address: document.getElementById('prof-address').value,
                paymentInfo: document.getElementById('prof-payment').value
            }).then(() => showToast('✅ Profil dikemaskini', 'success'))
              .catch(err => showToast('❌ ' + err.message, 'error'));
        }

        // Product Modal
        function openProductModal() {            showToast('Fitur tambah produk', 'info');
        }

        // Initialize - Show login by default
        document.addEventListener('DOMContentLoaded', () => {
            console.log('✅ Vendor Manager Loaded');
            // Login section is already visible by default in HTML
        });

        // Handle hash navigation
        window.addEventListener('hashchange', () => {
            const hash = location.hash.slice(1);
            if (hash && ['login', 'register', 'dashboard'].includes(hash)) {
                showSection(hash);
            }
        });
    </script>
</body>
</html>
