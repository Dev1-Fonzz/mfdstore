<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>🛍️ MFD Store - Vendor Manager</title>
  
  <!-- Firebase SDK (Modular) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
      getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, 
      signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, updatePassword 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { 
      getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, 
      query, where, orderBy, limit, onSnapshot, serverTimestamp, getDoc, setDoc 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    // 🔥 Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDMrexlgTwauuqmZ2kZECwqqEYmwtj7Zrs",
      authDomain: "mfd-store.firebaseapp.com",
      projectId: "mfd-store",
      storageBucket: "mfd-store.firebasestorage.app",
      messagingSenderId: "1039564529069",
      appId: "1:1039564529069:web:bc7c752f3618e6cb879524"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const googleProvider = new GoogleAuthProvider();

    // 🌐 Global State
    window.MFD = { auth, db, storage, googleProvider, currentUser: null, vendorData: null, isAdmin: false };

    // 🔊 Sound Effects System
    const SFX = {
      click: new Audio('https://assets.mixkit.co/sfx/preview/mixkit-modern-technology-select-3124.mp3'),
      success: new Audio('https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3'),
      error: new Audio('https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3'),
      notify: new Audio('https://assets.mixkit.co/sfx/preview/mixkit-software-interface-click-234.mp3')
    };
    const playSFX = (type) => { try { SFX[type]?.cloneNode().play(); } catch(e){} };

    // 🎨 Theme & UI Helpers    const UI = {
      grident: 'background: linear-gradient(135deg, #667eea 0%, #764ba2 30%, #f093fb 70%, #f5576c 100%);',
      glitter: 'position:relative; overflow:hidden;}',
      shimmer: '@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}',
      init: () => {
        document.head.insertAdjacentHTML('beforeend', `<style>
          ${UI.shimmer}
          *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
          body{${UI.grident} min-height:100vh;color:#1a1a2e;position:relative}
          body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 80%,rgba(255,255,255,0.15) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(255,255,255,0.1) 0%,transparent 50%);pointer-events:none;z-index:-1}
          .glitter::after{content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(255,255,255,0.3),transparent);background-size:200% 100%;animation:shimmer 2s infinite;pointer-events:none}
          .card{background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);border-radius:20px;padding:1.2rem;margin:0.8rem 0;box-shadow:0 8px 32px rgba(31,38,135,0.15);border:1px solid rgba(255,255,255,0.4);transition:transform 0.2s,box-shadow 0.2s}
          .card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(31,38,135,0.25)}
          .btn{background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;padding:0.7rem 1.4rem;border-radius:12px;font-weight:600;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:0.5rem}
          .btn:hover{transform:scale(1.03);box-shadow:0 6px 20px rgba(102,126,234,0.4)}
          .btn:active{transform:scale(0.98)}
          .btn-outline{background:transparent;border:2px solid #667eea;color:#667eea}
          .btn-danger{background:linear-gradient(135deg,#ff6b6b,#ee5a5a)}
          .btn-success{background:linear-gradient(135deg,#00d2aa,#00b894)}
          input,select,textarea{width:100%;padding:0.8rem;border:2px solid #e0e0ff;border-radius:12px;background:rgba(255,255,255,0.8);margin:0.4rem 0;font-size:1rem;transition:border-color 0.2s}
          input:focus,select:focus,textarea:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,0.2)}
          .hidden{display:none!important}
          .flex{display:flex;gap:1rem;align-items:center}
          .flex-col{display:flex;flex-direction:column;gap:0.8rem}
          .grid{display:grid;gap:1rem}
          .grid-2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
          .grid-3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
          .grid-4{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
          @media(max-width:768px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.flex{flex-direction:column;align-items:stretch}}
          .badge{display:inline-block;padding:0.3rem 0.8rem;border-radius:20px;font-size:0.85rem;font-weight:600}
          .badge-public{background:#00d2aa;color:#004d40}.badge-private{background:#ffa726;color:#5d3a00}.badge-oos{background:#ff6b6b;color:#5d1a1a}
          .status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px}
          .status-online{background:#00d2aa}.status-offline{background:#9e9e9e}
          table{width:100%;border-collapse:collapse;margin:1rem 0;background:rgba(255,255,255,0.9);border-radius:16px;overflow:hidden}
          th{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:1rem;text-align:left;font-weight:600}
          td{padding:0.9rem;border-bottom:1px solid #eee}
          tr:hover{background:rgba(102,126,234,0.08)}
          .product-img{width:100%;height:180px;object-fit:cover;border-radius:16px;background:#f5f5ff}
          .nav-bar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);padding:0.8rem 1.5rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.5)}
          .logo{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#667eea,#f093fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
          .search-bar{flex:1;max-width:500px;margin:0 2rem;position:relative}
          .search-bar input{padding-left:2.5rem;border-radius:25px}
          .search-bar::before{content:'🔍';position:absolute;left:1rem;top:50%;transform:translateY(-50%);opacity:0.6}
          .toast{position:fixed;bottom:20px;right:20px;background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;padding:1rem 1.5rem;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.3);z-index:1000;animation:slideIn 0.3s ease}
          @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
          .chat-bubble{max-width:75%;padding:0.8rem 1.2rem;border-radius:18px;margin:0.4rem 0;position:relative}
          .chat-me{background:linear-gradient(135deg,#667eea,#764ba2);color:white;margin-left:auto;border-bottom-right-radius:6px}
          .chat-other{background:rgba(255,255,255,0.9);margin-right:auto;border-bottom-left-radius:6px}
          .typing-indicator{display:inline-flex;gap:4px;padding:0.5rem}
          .typing-indicator span{width:8px;height:8px;background:#667eea;border-radius:50%;animation:bounce 1.4s infinite ease-in-out}          .typing-indicator span:nth-child(1){animation-delay:-0.32s}.typing-indicator span:nth-child(2){animation-delay:-0.16s}
          @keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
          .section{padding:1.5rem;max-width:1400px;margin:0 auto}
          .section-title{font-size:1.5rem;font-weight:700;margin:1rem 0;color:#1a1a2e;display:flex;align-items:center;gap:0.5rem}
          .tabs{display:flex;gap:0.5rem;margin:1rem 0;flex-wrap:wrap}
          .tab{padding:0.6rem 1.2rem;border-radius:12px;background:rgba(255,255,255,0.7);cursor:pointer;transition:all 0.2s;font-weight:500}
          .tab.active{background:linear-gradient(135deg,#667eea,#764ba2);color:white}
          .modal{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
          .modal-content{background:white;border-radius:24px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;padding:1.5rem;position:relative}
          .modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.5rem;cursor:pointer;color:#666}
          .rating{color:#ffc107;font-size:1.1rem}
          .price{font-size:1.3rem;font-weight:700;color:#1a1a2e}.price-old{text-decoration:line-through;color:#999;font-size:1rem;margin-right:0.5rem}
          .revenue-badge{background:linear-gradient(135deg,#00d2aa,#00b894);color:white;padding:0.3rem 0.8rem;border-radius:20px;font-weight:600;font-size:0.9rem}
        </style>`);
      }
    };

    // 📦 Utility Functions
    const Utils = {
      generateUAC: () => 'UAC-' + Math.random().toString(36).substr(2,8).toUpperCase(),
      generateItemCode: () => 'ITM-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substr(2,4).toUpperCase(),
      generateVendorID: () => 'VENFD-' + Math.random().toString(36).substr(2,6).toUpperCase(),
      formatCurrency: (amt) => 'RM ' + (amt||0).toFixed(2),
      formatDate: (ts) => ts?.toDate ? ts.toDate().toLocaleString('ms-MY') : new Date(ts||Date.now()).toLocaleString('ms-MY'),
      showToast: (msg, type='info') => {
        playSFX(type==='error'?'error':'success');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<strong>${type==='error'?'❌':'✅'}</strong> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(()=>toast.remove(),3000);
      },
      confirm: (msg) => new Promise(res=>{if(window.confirm(msg))res(true);else res(false);})
    };

    // 🔐 Authentication Module
    const Auth = {
      init: () => {
        onAuthStateChanged(auth, async (user) => {
          window.MFD.currentUser = user;
          if(user){
            await Auth.loadVendorData(user.uid);
            UI.showDashboard();
          } else {
            UI.showAuth();
          }
        });
      },
      register: async (email,password,businessName) => {
        try{          const cred = await createUserWithEmailAndPassword(auth,email,password);
          const vendorID = Utils.generateVendorID();
          const uac = Utils.generateUAC();
          await setDoc(doc(db,'vendors',cred.user.uid),{
            uid: cred.user.uid, vendorID, uac, email,
            sellerName: `Seller_${vendorID.split('-')[1]}`, businessName: businessName||'My Business',
            description:'', phone:'', vendorAddress:{}, paymentInfo:{}, 
            accountStatus:'ACTIVE', createdAt:serverTimestamp(), lastLogin:serverTimestamp(),
            commissionRate:1.00, totalSales:0, totalOrders:0, productCount:0
          });
          Utils.showToast('Akaun berjaya didaftarkan! 🎉');
          return true;
        }catch(e){Utils.showToast(e.message,'error');return false;}
      },
      login: async (email,password) => {
        try{
          await signInWithEmailAndPassword(auth,email,password);
          Utils.showToast('Selamat kembali! 👋');
          return true;
        }catch(e){Utils.showToast(e.message,'error');return false;}
      },
      googleLogin: async () => {
        try{
          const result = await signInWithPopup(auth,googleProvider);
          // Check if vendor doc exists, if not create
          const vendorRef = doc(db,'vendors',result.user.uid);
          const vendorSnap = await getDoc(vendorRef);
          if(!vendorSnap.exists()){
            const vendorID = Utils.generateVendorID();
            const uac = Utils.generateUAC();
            await setDoc(vendorRef,{
              uid: result.user.uid, vendorID, uac, 
              email: result.user.email, sellerName: result.user.displayName||`Seller_${vendorID.split('-')[1]}`,
              businessName: result.user.displayName+"'s Store", description:'', phone:'', 
              vendorAddress:{}, paymentInfo:{}, accountStatus:'ACTIVE',
              createdAt:serverTimestamp(), lastLogin:serverTimestamp(),
              commissionRate:1.00, totalSales:0, totalOrders:0, productCount:0,
              photoURL: result.user.photoURL
            });
          }else{
            await updateDoc(vendorRef,{lastLogin:serverTimestamp()});
          }
          Utils.showToast('Log masuk dengan Google berjaya! ✨');
          return true;
        }catch(e){Utils.showToast(e.message,'error');return false;}
      },
      logout: async () => {
        await signOut(auth);
        window.MFD.vendorData = null;
        UI.showAuth();        Utils.showToast('Anda telah log keluar 👋');
      },
      loadVendorData: async (uid) => {
        const snap = await getDoc(doc(db,'vendors',uid));
        if(snap.exists()){
          window.MFD.vendorData = snap.data();
          window.MFD.isAdmin = snap.data()?.role === 'admin';
        }
      },
      updatePassword: async (newPass) => {
        if(auth.currentUser) await updatePassword(auth.currentUser,newPass);
      }
    };

    // 🛒 Product Management
    const Products = {
      add: async (productData) => {
        try{
          const itemCode = Utils.generateItemCode();
          const docRef = await addDoc(collection(db,'products'),{
            ...productData, itemCode, vendorID: window.MFD.vendorData.vendorID,
            uac: window.MFD.vendorData.uac, totalSold:0, rating:0, reviews:[],
            createdAt:serverTimestamp(), updatedAt:serverTimestamp(), status:'Public'
          });
          // Update vendor product count
          await updateDoc(doc(db,'vendors',auth.currentUser.uid),{
            productCount: (window.MFD.vendorData.productCount||0)+1,
            lastLogin:serverTimestamp()
          });
          Utils.showToast('Produk berjaya ditambah! 🚀');
          return docRef.id;
        }catch(e){Utils.showToast(e.message,'error');throw e;}
      },
      update: async (productId, updates) => {
        await updateDoc(doc(db,'products',productId),{...updates,updatedAt:serverTimestamp()});
        Utils.showToast('Produk dikemaskini! ✏️');
      },
      delete: async (productId) => {
        if(await Utils.confirm('Padam produk ini?')){
          await deleteDoc(doc(db,'products',productId));
          Utils.showToast('Produk dipadam 🗑️');
        }
      },
      listen: (vendorID, callback) => {
        const q = query(collection(db,'products'),where('vendorID','==',vendorID),orderBy('createdAt','desc'));
        return onSnapshot(q, (snap)=>{
          const products = [];
          snap.forEach(doc=>products.push({id:doc.id,...doc.data()}));
          callback(products);
        });      },
      search: async (keyword) => {
        // Simple client-side search for demo; use Algolia/Firestore composite indexes for production
        const snap = await getDocs(collection(db,'products'));
        return snap.docs.filter(d=>{
          const data = d.data();
          const kw = keyword.toLowerCase();
          return data.name?.toLowerCase().includes(kw) || data.description?.toLowerCase().includes(kw);
        }).map(d=>({id:d.id,...d.data()}));
      }
    };

    // 📦 Order Management
    const Orders = {
      create: async (orderData) => {
        const orderId = 'ORD-'+Date.now().toString(36).toUpperCase();
        await addDoc(collection(db,'orders'),{
          ...orderData, orderId, status:'To Pay', createdAt:serverTimestamp(),
          paymentStatus:'Not Verified', trackingNumber:'', adminNotes:''
        });
        Utils.showToast('Pesanan dibuat! 📦');
        return orderId;
      },
      listenVendorOrders: (vendorID, callback) => {
        const q = query(collection(db,'orders'),where('vendorID','==',vendorID),orderBy('createdAt','desc'));
        return onSnapshot(q, snap=>{
          const orders = [];
          snap.forEach(doc=>orders.push({id:doc.id,...doc.data()}));
          callback(orders);
        });
      },
      updateStatus: async (orderId, status, notes='') => {
        await updateDoc(doc(db,'orders',orderId),{status,adminNotes:notes,updatedAt:serverTimestamp()});
        Utils.showToast('Status pesanan dikemaskini! 🔄');
      }
    };

    // 💬 Live Chat System
    const Chat = {
      createConversation: async (vendorUAC, customerUAC) => {
        const convId = [vendorUAC,customerUAC].sort().join('_');
        const docRef = doc(db,'conversations',convId);
        const snap = await getDoc(docRef);
        if(!snap.exists()){
          await setDoc(docRef,{
            participants:[vendorUAC,customerUAC],
            vendorID:window.MFD.vendorData.vendorID,
            createdAt:serverTimestamp(),lastMessage:'',lastMessageAt:serverTimestamp(),
            status:'active'
          });        }
        return convId;
      },
      sendMessage: async (convId, text, type='text', attachment=null) => {
        await addDoc(collection(db,'conversations',convId,'messages'),{
          senderUAC: window.MFD.vendorData.uac, text, type, attachment,
          timestamp: serverTimestamp(), status:'sent', readBy:[]
        });
        // Update last message
        await updateDoc(doc(db,'conversations',convId),{
          lastMessage: type==='text'?text:`[${type}]`,
          lastMessageAt: serverTimestamp()
        });
        playSFX('notify');
      },
      listenMessages: (convId, callback) => {
        const q = query(collection(db,'conversations',convId,'messages'),orderBy('timestamp','asc'));
        return onSnapshot(q, snap=>{
          const msgs = [];
          snap.forEach(doc=>msgs.push({id:doc.id,...doc.data()}));
          callback(msgs);
        });
      },
      listenConversations: (vendorUAC, callback) => {
        const q = query(collection(db,'conversations'),where('participants','array-contains',vendorUAC),orderBy('lastMessageAt','desc'));
        return onSnapshot(q, snap=>{
          const convs = [];
          snap.forEach(doc=>convs.push({id:doc.id,...doc.data()}));
          callback(convs);
        });
      }
    };

    // 🎨 UI Rendering
    const UI = {
      ...UI, // merge previous UI
      showAuth: () => {
        document.body.innerHTML = `
          <div class="section" style="max-width:500px;margin:2rem auto">
            <div class="card glitter">
              <h2 style="text-align:center;margin-bottom:1.5rem">🔐 MFD Store Vendor</h2>
              <div class="tabs">
                <div class="tab active" onclick="MFD_UI.switchAuth('login')">Login</div>
                <div class="tab" onclick="MFD_UI.switchAuth('register')">Register</div>
              </div>
              <form id="authForm" class="flex-col">
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required minlength="6">
                <div id="registerFields" class="hidden">
                  <input type="text" id="businessName" placeholder="Business Name (Optional)">                </div>
                <button type="submit" class="btn">🚀 Get Started</button>
              </form>
              <div style="text-align:center;margin:1rem 0">─ OR ─</div>
              <button class="btn btn-outline" style="width:100%;justify-content:center" onclick="MFD_Auth.googleLogin()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Login with Google
              </button>
            </div>
          </div>`;
        document.getElementById('authForm').onsubmit = async (e)=>{
          e.preventDefault();
          const email = document.getElementById('email').value;
          const password = document.getElementById('password').value;
          const isRegister = document.getElementById('registerFields').classList.contains('hidden')===false;
          if(isRegister){
            const businessName = document.getElementById('businessName').value;
            await Auth.register(email,password,businessName);
          }else{
            await Auth.login(email,password);
          }
        };
      },
      switchAuth: (mode) => {
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        event.target.classList.add('active');
        const regFields = document.getElementById('registerFields');
        if(mode==='register'){regFields.classList.remove('hidden');document.getElementById('authForm').querySelector('button').textContent='📝 Register Account';}
        else{regFields.classList.add('hidden');document.getElementById('authForm').querySelector('button').textContent='🔑 Login Account';}
      },
      showDashboard: () => {
        const v = window.MFD.vendorData;
        document.body.innerHTML = `
          <nav class="nav-bar glitter">
            <div class="logo">🛍️ MFD Store</div>
            <div class="search-bar"><input type="search" id="globalSearch" placeholder="Search products..."></div>
            <div class="flex">
              <span class="badge" style="background:rgba(102,126,234,0.2)">👤 ${v?.sellerName||'Vendor'}</span>
              ${v?.role==='admin'?'<span class="badge badge-public">👑 Admin</span>':''}
              <button class="btn btn-outline" onclick="MFD_Auth.logout()">Logout</button>
            </div>
          </nav>
          
          <div class="tabs section" style="padding-top:0">
            <div class="tab active" data-tab="showcase">🏪 Showcase</div>
            <div class="tab" data-tab="products">📦 My Products</div>
            <div class="tab" data-tab="orders">📋 Orders</div>
            <div class="tab" data-tab="profile">⚙️ Profile</div>
            ${v?.role==='admin'?'<div class="tab" data-tab="admin">👑 Admin Panel</div>':''}
            <div class="tab" data-tab="chat">💬 Live Agent</div>
          </div>          
          <div id="tabContent" class="section"></div>
          
          <!-- Product Modal -->
          <div id="productModal" class="modal hidden">
            <div class="modal-content glitter">
              <button class="modal-close" onclick="document.getElementById('productModal').classList.add('hidden')">&times;</button>
              <div id="productModalBody"></div>
            </div>
          </div>
        `;
        
        // Tab switching
        document.querySelectorAll('.tab[data-tab]').forEach(tab=>{
          tab.onclick = (e)=>{
            document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
            e.currentTarget.classList.add('active');
            UI.renderTab(e.currentTarget.dataset.tab);
            playSFX('click');
          };
        });
        
        // Initial render
        UI.renderTab('showcase');
        
        // Global search
        document.getElementById('globalSearch').oninput = Utils.debounce(async (e)=>{
          const results = await Products.search(e.target.value);
          UI.renderProducts(results, 'searchResults');
        }, 300);
      },
      renderTab: async (tabName) => {
        const container = document.getElementById('tabContent');
        playSFX('click');
        
        switch(tabName){
          case 'showcase':
            container.innerHTML = `<h3 class="section-title">✨ Product Showcase</h3><div id="showcaseGrid" class="grid grid-4"></div>`;
            // Listen to all public products
            const q = query(collection(db,'products'),where('status','==','Public'),orderBy('createdAt','desc'),limit(20));
            onSnapshot(q, snap=>{
              const products = [];
              snap.forEach(doc=>products.push({id:doc.id,...doc.data()}));
              UI.renderProducts(products, 'showcaseGrid');
            });
            break;
            
          case 'products':
            container.innerHTML = `
              <div class="flex" style="justify-content:space-between;align-items:center">                <h3 class="section-title">📦 My Products</h3>
                <button class="btn" onclick="UI.showAddProductModal()">+ Add Product</button>
              </div>
              <div id="myProductsTable"></div>`;

              <strong>${otherUAC}</strong>
              <div style="font-size:0.85rem;color:#666;margin-top:0.3rem">${c.lastMessage||'No messages yet'}</div>
              <small style="color:#999">${Utils.formatDate(c.lastMessageAt)}</small>
            </div>`;
          }).join('') || '<p style="text-align:center;color:#666">No conversations yet</p>';        });
      },
      currentConv: null,
      openConversation: (convId) => {
        UI.currentConv = convId;
        document.getElementById('chatHeader').innerHTML = `<strong>💬 Live Chat</strong> <span class="status-dot status-online"></span> Online`;
        const msgContainer = document.getElementById('chatMessages');
        msgContainer.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
        
        Chat.listenMessages(convId, msgs=>{
          msgContainer.innerHTML = msgs.map(m=>`
            <div class="chat-bubble ${m.senderUAC===window.MFD.vendorData.uac?'chat-me':'chat-other'}">
              ${m.type==='text'?m.text:m.type==='image'?`<img src="${m.attachment}" style="max-width:200px;border-radius:12px">`:`[${m.type}]`}
              <div style="font-size:0.75rem;opacity:0.8;margin-top:0.3rem;text-align:${m.senderUAC===window.MFD.vendorData.uac?'right':'left'}">${Utils.formatDate(m.timestamp)}</div>
            </div>
          `).join('');
          msgContainer.scrollTop = msgContainer.scrollHeight;
        });
        playSFX('click');
      },
      sendChatMessage: async () => {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if(!text || !UI.currentConv) return;
        await Chat.sendMessage(UI.currentConv, text);
        input.value = '';
      },
      sendAttachment: async () => {
        const file = document.getElementById('chatAttach').files[0];
        if(!file || !UI.currentConv) return;
        const url = URL.createObjectURL(file);
        await Chat.sendMessage(UI.currentConv, '', 'image', url);
        document.getElementById('chatAttach').value = '';
      }
    };

    // 🔄 Auto-update & Debounce
    Utils.debounce = (func, wait) => {
      let timeout;
      return function executedFunction(...args){
        const later = () => {clearTimeout(timeout); func(...args);};
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    };

    // 🌐 Expose to global for inline handlers
    window.MFD_UI = UI;
    window.MFD_Auth = Auth;
    window.MFD_Products = Products;    window.MFD_Orders = Orders;
    window.MFD_Chat = Chat;

    // 🚀 Initialize App
    document.addEventListener('DOMContentLoaded', ()=>{
      UI.init();
      Auth.init();
      // Request notification permission for auto-updates
      if('Notification' in window && Notification.permission==='default'){
        Notification.requestPermission();
      }
    });

    // 📡 Listen for real-time updates from admin
    if(window.MFD.vendorData?.uac){
      onSnapshot(doc(db,'system','announcements'), (doc)=>{
        if(doc.exists() && doc.data().targetUACs?.includes(window.MFD.vendorData.uac)){
          Utils.showToast(`📢 ${doc.data().title}`, 'notify');
          if('Notification' in window && Notification.permission==='granted'){
            new Notification('MFD Store Update', {body: doc.data().message});
          }
        }
      });
    }
  </script>
</head>

  <!-- Content rendered dynamically by JavaScript -->
  <div style="text-align:center;padding:3rem;color:white">
    <h2>🔄 Loading MFD Store Vendor Panel...</h2>
    <p style="margin-top:0.5rem;opacity:0.9">Initializing Firebase & Authentication</p>
  </div>
</body>
</html>
