<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MFD Store • Showcase Panel</title>
  <style>
    :root {
      --bg: #000;
      --card: #111;
      --text: #eee;
      --primary: #d32f2f;
      --border: #333;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, sans-serif;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-size: 2.4rem;
      background: linear-gradient(90deg, #fff, var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0;
    }
    .subtitle {
      color: #777;
      font-size: 0.9rem;
    }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }    h2 { margin-bottom: 24px; text-align: center; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-weight: 500; }
    input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #222;
      color: var(--text);
      font-size: 1rem;
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 8px;
    }
    button:hover { opacity: 0.9; }
    .link {
      text-align: center;
      margin-top: 20px;
      color: #aaa;
      font-size: 0.9rem;
    }
    .link a {
      color: var(--primary);
      text-decoration: none;
    }
    footer {
      margin-top: 40px;
      text-align: center;
      color: #555;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="logo">
    <h1>MFD Store</h1>
    <p class="subtitle">Your premium showcase panel • Powered by Google Sheets</p>
  </div>

  <div class="card" id="loginForm">    <h2>Login to Your Account</h2>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="+60123456789" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button onclick="login()">Login</button>
    <div class="link">
      Don't have an account? <a href="#" onclick="showRegister()">Register here</a>
    </div>
  </div>

  <div class="card hidden" id="registerForm">
    <h2>Create New Account</h2>
    <div class="form-group">
      <label>Phone Number (Malaysia)</label>
      <input type="tel" id="regPhone" placeholder="+60123456789" />
    </div>
    <div class="form-group">
      <label>Password (min 6 chars)</label>
      <input type="password" id="regPassword" placeholder="••••••••" />
    </div>
    <div class="form-group">
      <label>Email (optional)</label>
      <input type="email" id="regEmail" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Username (optional)</label>
      <input type="text" id="regUsername" placeholder="e.g. ali_mfd" />
    </div>
    <button onclick="register()">Register Account</button>
    <div class="link">
      Already have an account? <a href="#" onclick="showLogin()">Login here</a>
    </div>
  </div>

  <footer>
    © 2026 MFD Store • All data powered by Google Sheets
  </footer>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw8nvK1Dcs7ifwbCJHlwJgd0ZDnmWFbRVPzoMCpuz-SpbdMYsPsxJKmLjCRlwxvF_bs/exec";

    function showRegister() {
      document.getElementById("loginForm").classList.add("hidden");
      document.getElementById("registerForm").classList.remove("hidden");
    }    function showLogin() {
      document.getElementById("registerForm").classList.add("hidden");
      document.getElementById("loginForm").classList.remove("hidden");
    }

    async function login() {
      const phone = document.getElementById("phone").value.trim();
      const password = document.getElementById("password").value;
      if (!phone || !password) {
        alert("Please fill in phone and password.");
        return;
      }

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "login", phone, password })
        });
        const data = await res.json();
        if (data.success) {
          alert("Login successful! Redirecting to dashboard...");
          // Di sini, kamu boleh redirect ke dashboard.html atau load UI penuh
          // Untuk MVP: kita guna alert sahaja — kamu boleh tambah fitur selepas ini
        } else {
          alert(data.error || "Login failed.");
        }
      } catch (err) {
        alert("Network error. Please try again.");
      }
    }

    async function register() {
      const phone = document.getElementById("regPhone").value.trim();
      const password = document.getElementById("regPassword").value;
      const email = document.getElementById("regEmail").value.trim();
      const username = document.getElementById("regUsername").value.trim();

      if (!phone || !password) {
        alert("Phone and password are required.");
        return;
      }
      if (password.length < 6) {
        alert("Password must be at least 6 characters.");
        return;
      }

      try {
        const res = await fetch(API_URL, {
          method: "POST",          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "register", phone, password, email, username })
        });
        const data = await res.json();
        if (data.success) {
          alert("Account created! Please login.");
          showLogin();
        } else {
          alert(data.error || "Registration failed.");
        }
      } catch (err) {
        alert("Network error. Please try again.");
      }
    }

    // ⚠️ TIADA window.onload, TIADA auto-checkout, TIADA modal
    // Semua interaksi manual sahaja
  </script>
</body>
</html>
