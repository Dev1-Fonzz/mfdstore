<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Gambar</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a1a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#16162a;border-radius:16px;padding:32px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.4)}
    h1{text-align:center;font-size:20px;margin-bottom:24px;font-weight:600}
    .upload-box{border:2px dashed #3a3a5a;border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:.2s;background:#1a1a2e}
    .upload-box:hover{border-color:#6366f1;background:#1f1f3a}
    .upload-box.dragover{border-color:#6366f1;background:#242444}
    .icon{font-size:40px;margin-bottom:12px}
    .hint{color:#888;font-size:13px}
    .hint strong{color:#fff;display:block;margin-bottom:4px}
    #file{display:none}
    .loader{display:none;text-align:center;padding:20px}
    .spinner{width:32px;height:32px;border:3px solid #333;border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .result{display:none;margin-top:24px}
    .result.show{display:block}
    .link{background:#0a0a1a;border:1px solid #333;border-radius:8px;padding:12px;font-family:monospace;font-size:12px;color:#6366f1;word-break:break-all;line-height:1.4}
    .btn{background:#6366f1;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;width:100%;margin-top:12px;transition:.2s}
    .btn:hover{background:#4f46e5}
    .btn.copied{background:#059669}
    .error{display:none;background:#3f1a1a;border:1px solid #7f1d1d;color:#fca5a5;padding:12px;border-radius:8px;font-size:13px;margin-top:16px;text-align:center;white-space:pre-wrap}
    .error.show{display:block}
    .debug{margin-top:16px;padding:12px;background:#1a1a2e;border-radius:8px;font-size:11px;color:#666;font-family:monospace}
  </style>
</head>
<body>
  <div class="card">
    <h1>📤 Upload Gambar</h1>
    
    <div class="upload-box" id="dropZone">
      <div class="icon">🖼️</div>
      <div class="hint">
        <strong>Klik atau Drag & Drop</strong>
        JPG • PNG • GIF (Max 5MB)
      </div>
      <input type="file" id="file" accept="image/*">
    </div>

    <div class="loader" id="loader">
      <div class="spinner"></div>
      <div style="color:#888;font-size:13px">Memuat naik...</div>
    </div>
    <div class="result" id="result">
      <div class="link" id="link"></div>
      <button class="btn" id="copyBtn" onclick="copy()">📋 Salin Link</button>
    </div>

    <div class="error" id="error"></div>
    <div class="debug" id="debug"></div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('file');
    const loader = document.getElementById('loader');
    const result = document.getElementById('result');
    const linkEl = document.getElementById('link');
    const copyBtn = document.getElementById('copyBtn');
    const error = document.getElementById('error');
    const debug = document.getElementById('debug');

    dropZone.onclick = () => fileInput.click();

    ['dragenter','dragover'].forEach(e => 
      dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('dragover'); })
    );
    ['dragleave','drop'].forEach(e => 
      dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove('dragover'); })
    );

    dropZone.addEventListener('drop', ev => {
      const f = ev.dataTransfer.files[0];
      if (f) upload(f);
    });

    fileInput.addEventListener('change', ev => {
      const f = ev.target.files[0];
      if (f) upload(f);
    });

    async function upload(file) {
      if (!file.type.startsWith('image/')) return showError('❌ Hanya fail imej dibenarkan');
      if (file.size > 5*1024*1024) return showError('❌ Saiz fail melebihi 5MB');

      hideError(); 
      debug.textContent = '';
      result.classList.remove('show'); 
      loader.style.display = 'block'; 
      dropZone.style.display = 'none';

      try {
        const fd = new FormData();        fd.append('file', file);

        debug.textContent = '📡 Menghantar ke /api/upload...';

        const res = await fetch('/api/upload', { 
          method: 'POST', 
          body: fd 
        });

        debug.textContent += '\n📥 Status: ' + res.status + ' ' + res.statusText;

        const data = await res.json();
        debug.textContent += '\n📦 Response: ' + JSON.stringify(data, null, 2);

        if (res.ok && data.status === 'success' && data.url) {
          linkEl.textContent = data.url;
          result.classList.add('show');
          debug.textContent += '\n✅ Berjaya!';
        } else {
          const errMsg = data.error || data.message || data.details || JSON.stringify(data);
          showError('❌ ' + errMsg);
        }
      } catch (e) {
        console.error('Upload error:', e);
        const errMsg = e.message || String(e) || 'Unknown error';
        showError('❌ Ralat: ' + errMsg);
        debug.textContent = '🐛 Debug: ' + errMsg;
      } finally {
        loader.style.display = 'none';
        dropZone.style.display = 'block';
      }
    }

    function showError(msg) {
      error.textContent = msg;
      error.classList.add('show');
    }
    
    function hideError() { 
      error.classList.remove('show'); 
      error.textContent = '';
    }

    function copy() {
      navigator.clipboard.writeText(linkEl.textContent).then(() => {
        copyBtn.textContent = '✅ Tersalin!';
        copyBtn.classList.add('copied');
        setTimeout(() => { 
          copyBtn.textContent = '📋 Salin Link'; 
          copyBtn.classList.remove('copied');         }, 1500);
      });
    }
  </script>
</body>
</html>
