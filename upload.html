<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Gambar Blogger</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 50px auto; padding: 20px; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; }
        button { background: #ff6f00; color: white; border: none; cursor: pointer; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        #result { word-break: break-all; background: #f8f9fa; padding: 10px; }
    </style>
</head>
<body>
    <h2>📤 Upload Gambar ke Blogger</h2>
    
    <input type="email" id="bloggerEmail" placeholder="Email Blogger (mfdstore-only@blogger.com)" required>
    <input type="email" id="smtpEmail" placeholder="Gmail Anda" required>
    <input type="password" id="smtpPassword" placeholder="App Password Gmail" required>
    <input type="file" id="imageFile" accept="image/*" required>
    
    <button onclick="upload()" id="btn">🚀 Upload</button>
    
    <div class="status" id="status"></div>
    <div class="status" id="result"></div>

    <script>
        async function upload() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            
            const data = {
                bloggerEmail: document.getElementById('bloggerEmail').value,
                smtpEmail: document.getElementById('smtpEmail').value,
                smtpPassword: document.getElementById('smtpPassword').value,
                image: document.getElementById('imageFile').files[0]
            };

            if (!data.bloggerEmail || !data.smtpEmail || !data.smtpPassword || !data.image) {
                alert('Sila isi semua field!');
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ Processing...';

            const formData = new FormData();
            formData.append('bloggerEmail', data.bloggerEmail);
            formData.append('smtpEmail', data.smtpEmail);
            formData.append('smtpPassword', data.smtpPassword);
            formData.append('image', data.image);

            try {
                status.className = 'status info';
                status.textContent = '📧 Menghantar ke Blogger...';
                status.style.display = 'block';

                const res = await fetch('upload.php', { method: 'POST', body: formData });
                const text = await res.text();
                
                let json;
                try {
                    json = JSON.parse(text);
                } catch (e) {
                    throw new Error('Server error: ' + text.substring(0, 200));
                }

                if (json.success) {
                    status.className = 'status success';
                    status.textContent = '✅ Berjaya!';
                    result.innerHTML = '🔗 <a href="' + json.image_url + '" target="_blank">' + json.image_url + '</a><br><button onclick="navigator.clipboard.writeText(\'' + json.image_url + '\')">📋 Copy</button>';
                    result.style.display = 'block';
                } else {
                    throw new Error(json.message);
                }
            } catch (e) {
                status.className = 'status error';
                status.textContent = '❌ ' + e.message;
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Upload';
            }
        }
    </script>
</body>
</html>
