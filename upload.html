<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛍️ Upload Produk MFD Store</title>
    <style>
        *{box-sizing:border-box}body{font-family:Arial,sans-serif;max-width:500px;margin:20px auto;padding:15px;background:#f8f9fa}
        h2{text-align:center;color:#1a73e8;margin-bottom:20px}
        .card{background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
        label{display:block;margin:15px 0 5px;font-weight:600;color:#333}
        input[type="text"],input[type="file"],textarea{width:100%;padding:12px;border:2px solid #ddd;border-radius:8px;font-size:15px}
        input:focus,textarea:focus{border-color:#1a73e8;outline:none}
        button{width:100%;padding:14px;background:#ff6f00;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:10px}
        button:hover{background:#e66400}button:disabled{background:#ccc;cursor:not-allowed}
        .status{padding:12px;margin:15px 0;border-radius:8px;display:none}
        .success{background:#d4edda;color:#155724;border-left:4px solid #28a745}
        .error{background:#f8d7da;color:#721c24;border-left:4px solid #dc3545}
        .info{background:#d1ecf1;color:#0c5460;border-left:4px solid #17a2b8}
        #result{background:#fff;padding:15px;border-radius:8px;border:1px solid #eee;word-break:break-all}
        #result img{max-width:100%;border-radius:5px;margin:10px 0}
        #result a{color:#1a73e8;text-decoration:none}
        .hint{font-size:12px;color:#666;margin-top:4px;font-style:italic}
        .api-key-box{background:#fff3cd;padding:10px;border-radius:5px;border:1px solid #ffc107;margin:10px 0}
        footer{text-align:center;margin-top:25px;color:#888;font-size:13px}
    </style>
</head>
<body>
    <div class="card">
        <h2>🛍️ Upload Produk MFD Store</h2>
        
        <div class="api-key-box">
            <strong>🔑 API Key ImgBB:</strong>
            <input type="text" id="apiKey" placeholder="6f23d9c5feaa6a9378364a98831d034d" value="">
            <div class="hint">Dapat free: <a href="https://api.imgbb.com/" target="_blank">api.imgbb.com</a> → Sign Up → Copy API Key</div>
        </div>

        <label>📛 Nama Produk</label>
        <input type="text" id="productName" placeholder="Contoh: Baju Melayu Cotton Premium">

        <label>📝 Deskripsi (optional)</label>
        <textarea id="productDesc" rows="3" placeholder="Contoh: Material cotton, saiz S-XXL..."></textarea>

        <label>🖼️ Gambar Produk</label>
        <input type="file" id="imageFile" accept="image/*" required>
        <div class="hint">Format: JPG/PNG/WebP • Max: 32MB</div>

        <button onclick="uploadProduk()" id="btn">🚀 Upload Produk</button>

        <div class="status" id="status"></div>        <div class="status" id="result"></div>
    </div>

    <footer>
        🔒 Gambar disimpan di ImgBB (FREE, kekal, tiada expired)<br>
        💡 Copy link gambar untuk letak di blog/website
    </footer>

    <script>
        // 🔧 Fungsi upload ke ImgBB API
        async function uploadProduk() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            
            const apiKey = document.getElementById('apiKey').value.trim();
            const productName = document.getElementById('productName').value.trim();
            const productDesc = document.getElementById('productDesc').value.trim();
            const imageFile = document.getElementById('imageFile').files[0];

            // Validasi
            if (!apiKey) {
                showAlert('❌ Sila masukkan API Key ImgBB dahulu!', 'error');
                return;
            }
            if (!productName) {
                showAlert('❌ Sila masukkan nama produk!', 'error');
                return;
            }
            if (!imageFile) {
                showAlert('❌ Sila pilih gambar produk!', 'error');
                return;
            }
            if (imageFile.size > 32 * 1024 * 1024) {
                showAlert('❌ Saiz gambar melebihi 32MB!', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ Uploading...';
            showAlert('📤 Mengupload gambar ke ImgBB...', 'info');

            try {
                // Step 1: Upload gambar ke ImgBB API
                const formData = new FormData();
                formData.append('key', apiKey);
                formData.append('image', imageFile);
                formData.append('name', productName.replace(/[^a-z0-9]/gi, '_').toLowerCase());

                const res = await fetch('https://api.imgbb.com/1/upload', {                    method: 'POST',
                    body: formData
                });

                const json = await res.json();

                if (!json.success) {
                    throw new Error(json.error?.message || 'Upload gagal');
                }

                // Step 2: Prepare result
                const imageUrl = json.data.url;           // https://ibb.co/xxx
                const directUrl = json.data.image.url;    // https://i.ibb.co/xxx.jpg
                const thumbUrl = json.data.thumb.url;

                showAlert('✅ Upload berjaya!', 'success');
                
                result.innerHTML = `
                    <strong>📦 ${productName}</strong><br><br>
                    ${productDesc ? `<em>${productDesc}</em><br><br>` : ''}
                    <img src="${directUrl}" alt="${productName}" style="max-height:200px"><br>
                    <strong>🔗 Link Gambar (Direct):</strong><br>
                    <a href="${directUrl}" target="_blank">${directUrl}</a><br><br>
                    <strong>🔗 Link Page ImgBB:</strong><br>
                    <a href="${imageUrl}" target="_blank">${imageUrl}</a><br><br>
                    <button onclick="navigator.clipboard.writeText('${directUrl}')">📋 Copy Direct Link</button>
                    <button onclick="navigator.clipboard.writeText('[img]${directUrl}[/img]')" style="margin-top:5px;background:#28a745">📋 Copy BBCode</button>
                    <button onclick="navigator.clipboard.writeText('<img src="${directUrl}" alt="${productName}">')" style="margin-top:5px;background:#17a2b8">📋 Copy HTML</button>
                `;
                result.style.display = 'block';

                // Optional: Auto-copy direct link
                // navigator.clipboard.writeText(directUrl);

            } catch (e) {
                showAlert('❌ ' + e.message, 'error');
                console.error('Upload error:', e);
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Upload Produk';
            }
        }

        function showAlert(msg, type) {
            const status = document.getElementById('status');
            status.className = `status ${type}`;
            status.textContent = msg;
            status.style.display = 'block';
            // Auto-hide after 5 seconds for non-error
            if (type !== 'error') {                setTimeout(() => { status.style.display = 'none'; }, 5000);
            }
        }

        // 🔧 Auto-save API Key to localStorage (convenience)
        const apiKeyInput = document.getElementById('apiKey');
        if (localStorage.getItem('imgbb_key')) {
            apiKeyInput.value = localStorage.getItem('imgbb_key');
        }
        apiKeyInput.addEventListener('change', () => {
            localStorage.setItem('imgbb_key', apiKeyInput.value.trim());
        });
    </script>
</body>
</html>
