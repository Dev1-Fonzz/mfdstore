<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛍️ Upload Produk MFD Store</title>
    <style>
        *{box-sizing:border-box}body{font-family:Arial,sans-serif;max-width:500px;margin:20px auto;padding:15px;background:#f8f9fa}
        h2{text-align:center;color:#1a73e8;margin-bottom:20px}
        .card{background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
        label{display:block;margin:15px 0 5px;font-weight:600;color:#333}
        input[type="text"],input[type="file"],textarea{width:100%;padding:12px;border:2px solid #ddd;border-radius:8px;font-size:15px}
        input:focus,textarea:focus{border-color:#1a73e8;outline:none}
        button{width:100%;padding:14px;background:#ff6f00;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:10px}
        button:hover{background:#e66400}button:disabled{background:#ccc;cursor:not-allowed}
        .status{padding:12px;margin:15px 0;border-radius:8px;display:none}
        .success{background:#d4edda;color:#155724;border-left:4px solid #28a745}
        .error{background:#f8d7da;color:#721c24;border-left:4px solid #dc3545}
        .info{background:#d1ecf1;color:#0c5460;border-left:4px solid #17a2b8}
        #result{background:#fff;padding:15px;border-radius:8px;border:1px solid #eee;word-break:break-all}
        #result img{max-width:100%;border-radius:5px;margin:10px 0}
        #result a{color:#1a73e8;text-decoration:none}
        .hint{font-size:12px;color:#666;margin-top:4px;font-style:italic}
        footer{text-align:center;margin-top:25px;color:#888;font-size:13px}
        .btn-copy{background:#28a745;margin-top:5px}
        .btn-html{background:#17a2b8;margin-top:5px}
        .btn-bb{background:#6f42c1;margin-top:5px}
    </style>
</head>
<body>
    <div class="card">
        <h2>🛍️ Upload Produk MFD Store</h2>
        
        <label>📛 Nama Produk</label>
        <input type="text" id="productName" placeholder="Contoh: Baju Melayu Cotton Premium">

        <label>📝 Deskripsi (optional)</label>
        <textarea id="productDesc" rows="3" placeholder="Contoh: Material cotton, saiz S-XXL..."></textarea>

        <label>🖼️ Gambar Produk</label>
        <input type="file" id="imageFile" accept="image/*" required>
        <div class="hint">Format: JPG/PNG/WebP • Max: 32MB • Gambar kekal selamanya ✓</div>

        <button onclick="uploadProduk()" id="btn">🚀 Upload Produk</button>

        <div class="status" id="status"></div>
        <div class="status" id="result"></div>
    </div>

    <footer>        🔒 Gambar disimpan di ImgBB (FREE, kekal, tiada expired)<br>
        💡 Copy link untuk letak di blog/WhatsApp/Facebook
    </footer>

    <script>
        // 🔧 CONFIG - API KEY ANDA
        const API_KEY = 'b06f5cb40051c6b16bbb2b6994c1bed3'; // ⚠️ Ganti dengan key baru selepas regenerate!
        const API_URL = 'https://api.imgbb.com/1/upload';

        // 🔧 Fungsi utama upload
        async function uploadProduk() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            
            const productName = document.getElementById('productName').value.trim();
            const productDesc = document.getElementById('productDesc').value.trim();
            const imageFile = document.getElementById('imageFile').files[0];

            // Validasi input
            if (!productName) {
                showAlert('❌ Sila masukkan nama produk!', 'error');
                return;
            }
            if (!imageFile) {
                showAlert('❌ Sila pilih gambar produk!', 'error');
                return;
            }
            if (imageFile.size > 32 * 1024 * 1024) {
                showAlert('❌ Saiz gambar melebihi 32MB!', 'error');
                return;
            }

            // UI update
            btn.disabled = true;
            btn.textContent = '⏳ Uploading...';
            showAlert('📤 Mengupload ke ImgBB...', 'info');

            try {
                // Step 1: Prepare FormData
                const formData = new FormData();
                formData.append('key', API_KEY);
                formData.append('image', imageFile);
                formData.append('name', productName.replace(/[^a-z0-9]/gi, '_').toLowerCase());
                // ✅ expiration=0 = gambar KEKAL SELAMANYA (tiada auto-delete)
                formData.append('expiration', '0');

                // Step 2: POST ke ImgBB API
                const res = await fetch(API_URL, {
                    method: 'POST',                    body: formData
                });

                const json = await res.json();

                // Step 3: Handle response
                if (!json.success) {
                    throw new Error(json.error?.message || 'Upload gagal');
                }

                // ✅ Extract URLs dari response
                const { url, image, thumb, delete_url } = json.data;
                const directUrl = image.url; // https://i.ibb.co/xxx.jpg

                // Step 4: Show success
                showAlert('✅ Upload berjaya!', 'success');
                
                result.innerHTML = `
                    <strong>📦 ${escapeHtml(productName)}</strong><br><br>
                    ${productDesc ? `<em>${escapeHtml(productDesc)}</em><br><br>` : ''}
                    <img src="${directUrl}" alt="${escapeHtml(productName)}" style="max-height:200px;border-radius:5px"><br>
                    
                    <strong>🔗 Direct Image URL (untuk embed):</strong><br>
                    <a href="${directUrl}" target="_blank">${directUrl}</a><br><br>
                    
                    <strong>🔗 ImgBB Page:</strong><br>
                    <a href="${url}" target="_blank">${url}</a><br><br>
                    
                    <button onclick="copyToClipboard('${directUrl}')">📋 Copy Direct URL</button>
                    <button class="btn-html" onclick="copyToClipboard('<img src="${directUrl}" alt="${escapeHtml(productName)}">')">📋 Copy HTML</button>
                    <button class="btn-bb" onclick="copyToClipboard('[img]${directUrl}[/img]')">📋 Copy BBCode</button>
                    
                    <details style="margin-top:15px;font-size:13px">
                        <summary>🗑️ Link Delete (simpan untuk hapus gambar)</summary>
                        <a href="${delete_url}" target="_blank" style="word-break:break-all">${delete_url}</a>
                    </details>
                `;
                result.style.display = 'block';

            } catch (e) {
                showAlert('❌ ' + e.message, 'error');
                console.error('Upload error:', e);
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Upload Produk';
            }
        }

        // 🔧 Helper: Show status message
        function showAlert(msg, type) {            const status = document.getElementById('status');
            status.className = `status ${type}`;
            status.textContent = msg;
            status.style.display = 'block';
            if (type !== 'error') {
                setTimeout(() => { status.style.display = 'none'; }, 5000);
            }
        }

        // 🔧 Helper: Copy to clipboard
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Disalin ke clipboard!');
            }).catch(() => {
                // Fallback untuk browser lama
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                alert('✅ Disalin!');
            });
        }

        // 🔧 Helper: Escape HTML untuk elak XSS
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // 🔧 Auto-focus nama produk bila page load
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('productName').focus();
        });
    </script>
</body>
</html>
