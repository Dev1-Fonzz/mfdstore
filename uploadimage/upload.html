<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Gambar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f23; color: #fff;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .card {
            background: #1a1a2e; border-radius: 12px; padding: 40px;
            width: 100%; max-width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        h1 { color: #fff; font-size: 22px; text-align: center; margin-bottom: 8px; font-weight: 600; }
        .subtitle { color: #6b7280; text-align: center; font-size: 13px; margin-bottom: 30px; }
        
        .upload-box {
            border: 2px dashed #374151; border-radius: 10px; padding: 35px 20px;
            text-align: center; cursor: pointer; transition: all 0.25s ease; background: #16213e;
        }
        .upload-box:hover { border-color: #6366f1; background: #1f294a; }
        .upload-box.dragover { border-color: #6366f1; background: #24305e; }
        
        .icon { font-size: 42px; margin-bottom: 12px; }
        .upload-text { color: #9ca3af; font-size: 14px; }
        .upload-text strong { color: #e5e7eb; display: block; margin-bottom: 4px; }
        #fileInput { display: none; }
        
        .loading { display: none; text-align: center; padding: 20px; }
        .spinner {
            width: 36px; height: 36px; border: 3px solid #374151;
            border-top-color: #6366f1; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #9ca3af; font-size: 13px; }

        .result { display: none; margin-top: 25px; }
        .result.show { display: block; }
        
        .link-box {
            background: #0f0f23; border: 1px solid #374151;
            border-radius: 8px; padding: 14px;
        }
        .link-label { color: #6b7280; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .link-value { color: #6366f1; font-size: 13px; word-break: break-all; font-family: monospace; line-height: 1.5; }        
        .btn-copy {
            background: #6366f1; color: #fff; border: none; padding: 12px 24px;
            border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer;
            width: 100%; margin-top: 12px; transition: background 0.25s;
        }
        .btn-copy:hover { background: #4f46e5; }
        .btn-copy.copied { background: #059669; }

        .error {
            display: none; background: #450a0a; border: 1px solid #7f1d1d;
            color: #fca5a5; padding: 12px; border-radius: 8px;
            font-size: 13px; margin-top: 20px; text-align: center;
        }
        .error.show { display: block; }
        .preview { width: 100%; border-radius: 8px; margin-bottom: 15px; display: none; }
        .preview.show { display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Upload Gambar</h1>
        <p class="subtitle">Dapat link direct serta-merta</p>

        <div class="upload-box" id="dropZone">
            <div class="icon">📁</div>
            <div class="upload-text">
                <strong>Klik atau Drag & Drop</strong>
                JPG, PNG, GIF (Max 5MB)
            </div>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">Sedang memuat naik...</div>
        </div>

        <div class="result" id="result">
            <img id="preview" class="preview" src="" alt="Preview">
            <div class="link-box">
                <div class="link-label">Link Direct Imej</div>
                <div class="link-value" id="directLink"></div>
            </div>
            <button class="btn-copy" id="btnCopy" onclick="copyLink()">📋 Salin Link</button>
        </div>

        <div class="error" id="error"></div>
    </div>
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const preview = document.getElementById('preview');
        const directLink = document.getElementById('directLink');
        const btnCopy = document.getElementById('btnCopy');
        const error = document.getElementById('error');

        dropZone.addEventListener('click', () => fileInput.click());

        ['dragenter', 'dragover'].forEach(e => 
            dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('dragover'); })
        );
        ['dragleave', 'drop'].forEach(e => 
            dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove('dragover'); })
        );

        dropZone.addEventListener('drop', ev => {
            const files = ev.dataTransfer.files;
            if (files.length) processFile(files[0]);
        });

        fileInput.addEventListener('change', ev => {
            if (ev.target.files.length) processFile(ev.target.files[0]);
        });

        async function processFile(file) {
            if (!file.type.startsWith('image/')) { showError('❌ Hanya fail imej dibenarkan'); return; }
            if (file.size > 5 * 1024 * 1024) { showError('❌ Saiz melebihi 5MB'); return; }

            hideError(); result.classList.remove('show'); loading.style.display = 'block'; dropZone.style.display = 'none';

            try {
                const formData = new FormData();
                formData.append('file', file);

                // 🔥 PENTING: Call ke serverless function ANDA SENDIRI, bukan direct ke postimages
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                    // Jangan set Content-Type header manually untuk FormData
                });

                const data = await response.json();

                if (response.ok && data.status === 'success' && data.url) {
                    preview.src = data.url; preview.classList.add('show');
                    directLink.textContent = data.url;                    result.classList.add('show');
                } else {
                    showError('❌ Upload gagal: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                console.error('Error:', err);
                showError('❌ Ralat sambungan: ' + err.message);
            } finally {
                loading.style.display = 'none';
                dropZone.style.display = 'block';
            }
        }

        function showError(msg) { error.textContent = msg; error.classList.add('show'); loading.style.display = 'none'; dropZone.style.display = 'block'; }
        function hideError() { error.classList.remove('show'); }

        function copyLink() {
            navigator.clipboard.writeText(directLink.textContent).then(() => {
                btnCopy.textContent = '✅ Tersalin!'; btnCopy.classList.add('copied');
                setTimeout(() => { btnCopy.textContent = '📋 Salin Link'; btnCopy.classList.remove('copied'); }, 2000);
            });
        }
    </script>
</body>
</html>
